openapi: 3.0.3
info:
  title: Bank Cards Authentication API
  version: 1.0.0
  description: API для аутентификации пользователей и управления JWT-токенами

paths:
  /auth/sign-in:
    post:
      tags:
        - Auth
      summary: Вход пользователя
      description: Принимает учетные данные пользователя и возвращает JWT токен и refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCredentialsDto'
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwtAuthenticationDto'
        '401':
          description: Ошибка аутентификации

  /auth/sign-up:
    post:
      tags:
        - Auth
      summary: Регистрация пользователя
      description: Создает нового пользователя и возвращает JWT токен и refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDto'
      responses:
        '200':
          description: Пользователь успешно зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwtAuthenticationDto'
        '400':
          description: Неверные данные пользователя

  /auth/refresh:
    post:
      tags:
        - CardController
      summary: Обновление JWT токена
      description: Принимает refresh token и возвращает новый JWT токен.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenDto'
      responses:
        '200':
          description: Новый JWT токен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwtAuthenticationDto'
        '401':
          description: Неверный или просроченный refresh token

  /admin/card-control/create:
    post:
      tags:
        - CardController
      summary: Создать карту
      description: Создает новую карту (только для администраторов)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardDto'
      responses:
        '200':
          description: Карта успешно создана
        '400':
          description: Некорректные данные

  /admin/card-control/{cardId}:
    get:
      tags:
        - CardController
      summary: Получить карту по ID
      description: Возвращает карту по ID (только для администраторов)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: cardId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Карта найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardDto'
        '404':
          description: Карта не найдена

  /admin/card-control/all/{page}/{pageSize}:
    get:
      tags:
        - CardController
      summary: Получить все карты
      description: Возвращает список всех карт с пагинацией (только для администраторов)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: page
          required: true
          schema:
            type: integer
        - in: path
          name: pageSize
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Список карт
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CardDto'

  /admin/card-control/update/:
    put:
      tags:
        - CardController
      summary: Обновить карту
      description: Обновляет данные карты (только для администраторов)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardDto'
      responses:
        '200':
          description: Карта успешно обновлена
        '400':
          description: Некорректные данные

  /admin/card-control/delete/{id}:
    delete:
      tags:
        - CardController
      summary: Удалить карту
      description: Удаляет карту по ID (только для администраторов)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Карта успешно удалена
        '404':
          description: Карта не найдена

  /user/card-control/block:
    post:
      tags:
        - CardController
      summary: Заблокировать карту
      description: Пользователь блокирует свою карту
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockRequest'
      responses:
        '200':
          description: Карта успешно заблокирована
        '400':
          description: Некорректные данные

  /user/card-control/balance:
    post:
      tags:
        - CardController
      summary: Получить баланс карты
      description: Возвращает баланс указанной карты пользователя
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BalanceRequest'
      responses:
        '200':
          description: Баланс карты
          content:
            application/json:
              schema:
                type: integer

  /user/card-control/{page}/{pageSize}:
    get:
      tags:
        - CardController
      summary: Получить карты пользователя
      description: Возвращает список карт пользователя с пагинацией
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: page
          required: true
          schema:
            type: integer
        - in: path
          name: pageSize
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Список карт пользователя
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CardDto'

  /user/card-control/transition:
    post:
      tags:
        - TransitionController
      summary: Перевод между картами пользователя
      description: Пользователь переводит деньги между своими картами
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferDto'
      responses:
        '200':
          description: Перевод выполнен успешно
        '400':
          description: Некорректные данные перевода
        '401':
          description: Неавторизованный пользователь

  /admin/user-control/create:
    post:
      tags:
        - UserController
      summary: Создать пользователя
      description: Создает нового пользователя (только для админов)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDto'
      responses:
        '200':
          description: Пользователь успешно создан
        '400':
          description: Некорректные данные
        '401':
          description: Неавторизованный пользователь

  /admin/user-control/{id}:
    get:
      tags:
        - UserController
      summary: Получить пользователя по ID
      description: Возвращает данные пользователя по ID
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Пользователь найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
        '404':
          description: Пользователь не найден
        '401':
          description: Неавторизованный пользователь

  /admin/user-control/all/{page}/{pageSize}:
    get:
      tags:
        - UserController
      summary: Получить всех пользователей
      description: Возвращает список всех пользователей с пагинацией
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: page
          required: true
          schema:
            type: integer
        - in: path
          name: pageSize
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Список пользователей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserDto'
        '401':
          description: Неавторизованный пользователь

  /admin/user-control/update:
    put:
      tags:
        - UserController
      summary: Обновить пользователя
      description: Обновляет данные пользователя (только для админов)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDto'
      responses:
        '200':
          description: Пользователь успешно обновлен
        '400':
          description: Некорректные данные
        '401':
          description: Неавторизованный пользователь

  /admin/user-control/delete/{id}:
    delete:
      tags:
        - UserController
      summary: Удалить пользователя
      description: Удаляет пользователя по ID (только для админов)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Пользователь успешно удален
        '404':
          description: Пользователь не найден
        '401':
          description: Неавторизованный пользователь

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserCredentialsDto:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: user1
        password:
          type: string
          format: password
          example: myPassword123

    JwtAuthenticationDto:
      type: object
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          example: dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4=

    RefreshTokenDto:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          example: dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4=

    CardDto:
      type: object
      required:
        - cardNumber
        - validityPeriod
        - status
        - balance
        - userId
      properties:
        id:
          type: integer
          example: 1
        cardNumber:
          type: string
          example: "1234567812345678"
        validityPeriod:
          type: string
          format: date
          example: "2027-03-12"
        status:
          type: string
          example: "active"
        balance:
          type: integer
          example: 1000
        userId:
          type: integer
          example: 1

    BlockRequest:
      type: object
      required:
        - cardNumber
      properties:
        cardNumber:
          type: string
          example: "1234567812345678"

    BalanceRequest:
      type: object
      required:
        - cardNumber
      properties:
        cardNumber:
          type: string
          example: "1234567812345678"

    UserDto:
      type: object
      required:
        - username
        - password
        - role
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: user1
        password:
          type: string
          format: password
          example: myPassword123
        role:
          type: string
          example: ADMIN

    TransferDto:
      type: object
      required:
        - fromCardNumber
        - toCardNumber
        - amount
      properties:
        fromCardNumber:
          type: string
          example: "1234567812345678"
        toCardNumber:
          type: string
          example: "8765432187654321"
        amount:
          type: integer
          example: 500