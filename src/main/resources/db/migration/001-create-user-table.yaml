databaseChangeLog:
  - changeSet:
      id: create-user-table
      author: dev

      changes:
        - createTable:
            tableName: users
            columns:

              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: first_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: last_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: age
                  type: DATE

              - column:
                  name: role
                  type: VARCHAR(50)